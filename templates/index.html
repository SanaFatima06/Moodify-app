<!DOCTYPE html>
<html>
<head>
    <title>Moodify 🎧</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: "Inter", Arial, sans-serif;
        background: radial-gradient(circle at top, #1f2937, #0b1220 70%);
        color: #e5e7eb;
    }

    .app-title {
        margin-top: 60px;
        font-size: 44px;
        font-weight: 800;
        letter-spacing: -1px;
        background: linear-gradient(90deg, #a78bfa, #60a5fa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .subtitle {
        color: #94a3b8;
        margin-bottom: 25px;
        font-size: 15px;
    }

    .app-box {
        max-width: 600px;
        margin-top: 10px;
    }

    /* ✨ Glass Card Effect */
    .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        color: #e5e7eb;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .form-control {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
        color: #e5e7eb;
        border-radius: 12px;
        padding: 12px;
    }

    .form-control::placeholder {
        color: #64748b;
    }

    .form-control:focus {
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid #a78bfa;
        box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
        color: white;
    }

    .btn-primary {
        background: linear-gradient(90deg, #a78bfa, #60a5fa);
        border: none;
        border-radius: 12px;
        padding: 11px;
        font-weight: 600;
        transition: transform 0.15s ease, opacity 0.2s ease;
    }

    .btn-primary:hover {
        transform: scale(1.02);
        opacity: 0.95;
    }

    .badge {
        background: linear-gradient(90deg, #a78bfa, #60a5fa);
        color: #0b1220;
        padding: 8px 12px;
        border-radius: 10px;
        font-weight: 600;
    }

    .list-group-item {
        background: transparent;
        border: none;
        padding: 10px 0;
        color: #cbd5e1;
        transition: color 0.2s ease;
    }

    .list-group-item:hover {
        color: white;
    }

    hr {
        border-color: rgba(148, 163, 184, 0.2);
    }

    .card-title {
        font-weight: 700;
        color: #f1f5f9;
    }
</style>
</head>

<body>

<div class="container d-flex flex-column align-items-center">

    <!-- TITLE -->
    <div class="text-center">
        <div class="app-title">Moodify 🎧</div>
        <p class="subtitle">Tell me how you feel, I’ll recommend songs for your vibe</p>
    </div>

    <!-- MAIN BOX -->
    <div class="app-box w-100">

        <!-- INPUT CARD -->
        <div class="card mt-3 p-4">

            <form method="POST">

                <input type="text"
                       name="user_text"
                       class="form-control mb-3"
                       placeholder="How are you feeling?"
                       required>

                <button class="btn btn-primary w-100">
                    Get Songs 🎵
                </button>

            </form>

        </div>

        <!-- RESULT CARD -->
        {% if mood %}

        <div class="card mt-4 p-4">

            <h4 class="card-title">Detected Mood</h4>

            <span class="badge mt-2">
                {{ mood }}
            </span>

            <hr>

            <h5>Recommended Songs 🎧</h5>

            <ul class="list-group list-group-flush mt-2">
                {% for song in songs %}
                    <li class="list-group-item">🎵 {{ song }}</li>
                {% endfor %}
            </ul>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
